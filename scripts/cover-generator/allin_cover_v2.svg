<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="subtleWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#F0EBE1"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1080" height="1350" fill="url(#subtleWarm)"/>
  <rect width="1080" height="1350" filter="url(#grain)" opacity="0.02"/>

  <!-- 右侧竖排品牌 -->
  <text id="brand-vertical-1" x="1040" y="75" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="17" font-weight="400" fill="#AAAAAA" text-anchor="middle">
    <tspan x="1040" dy="0">硅</tspan><tspan x="1040" dy="26">谷</tspan><tspan x="1040" dy="26">顶</tspan><tspan x="1040" dy="26">级</tspan><tspan x="1040" dy="26">V</tspan><tspan x="1040" dy="26">C</tspan>
  </text>
  <text id="brand-vertical-2" x="1012" y="75" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="17" font-weight="400" fill="#AAAAAA" text-anchor="middle">
    <tspan x="1012" dy="0">中</tspan><tspan x="1012" dy="26">文</tspan><tspan x="1012" dy="26">知</tspan><tspan x="1012" dy="26">识</tspan><tspan x="1012" dy="26">库</tspan>
  </text>

  <!-- 顶部品牌行 -->
  <text id="series-label" x="55" y="68" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="20" font-weight="500" fill="#999999" letter-spacing="4">ALL IN PODCAST · E270</text>

  <!-- 主标题 -->
  <text id="main-title" x="50" y="230" font-family="PingFang SC, Noto Sans SC, sans-serif" font-weight="900" fill="#1A1A1A">
    <tspan font-size="108" x="50" dy="0">算力竞赛2600亿</tspan>
    <tspan font-size="108" x="50" dy="136">砸下去，到底在</tspan>
    <tspan font-size="108" x="50" dy="136">赌什么？</tspan>
  </text>

  <!-- 红色副标题 -->
  <text id="subtitle" x="55" y="690" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="48" font-weight="700" fill="#C0392B" letter-spacing="1">
    <tspan x="55" dy="0">有个判断国内没人提，</tspan>
    <tspan x="55" dy="72">听完我重新想了很久。</tspan>
  </text>

  <!-- 内容说明（左侧） -->
  <text x="55" y="900" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="24" font-weight="400" fill="#555555">
    <tspan x="55" dy="0">4位管理超500亿美金的硅谷VC，</tspan>
    <tspan x="55" dy="38">这期聊了：</tspan>
  </text>
  <text x="55" y="1000" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="22" font-weight="400" fill="#888888">
    <tspan x="55" dy="0">· AI算力军备竞赛</tspan>
    <tspan x="55" dy="36">· SaaS订阅制的诺基亚时刻</tspan>
    <tspan x="55" dy="36">· 基础设施过剩悖论</tspan>
    <tspan x="55" dy="36">· 普通人的算力成本信号</tspan>
  </text>

