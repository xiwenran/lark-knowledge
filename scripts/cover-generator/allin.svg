<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <!-- 深蓝黑渐变 -->
    <radialGradient id="warmGlow" cx="0.15" cy="0.1" r="0.8">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="0.85" cy="0.9" r="0.7">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- 金色光晕更鲜明 -->
    <radialGradient id="accentGlow" cx="0.25" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#E8C547" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#E8C547" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0"/>
    </radialGradient>

    <!-- 底部渐变 -->
    <linearGradient id="bottomWeight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0.05"/>
    </linearGradient>

    <!-- 左侧金线 -->
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#D4A825"/>
    </linearGradient>

    <!-- 噪点 -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- 层1：深色背景 -->
  <rect width="1080" height="1350" fill="url(#warmGlow)"/>
  <rect width="1080" height="1350" fill="url(#coolGlow)"/>

  <!-- 层2：金色光晕（更鲜明） -->
  <rect width="1080" height="1350" fill="url(#accentGlow)"/>

  <!-- 层3：底部渐变 -->
  <rect width="1080" height="1350" fill="url(#bottomWeight)"/>

  <!-- 层4：噪点 -->
  <rect width="1080" height="1350" filter="url(#grain)" opacity="0.03"/>

  <!-- 大号虚化期号水印 -->
  <text x="700" y="1020" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="420" font-weight="900" fill="#FFFFFF" opacity="0.025" text-anchor="middle" letter-spacing="20">270</text>

  <!-- 几何装饰 -->
  <circle cx="920" cy="380" r="100" fill="none" stroke="#E8C547" stroke-width="0.8" opacity="0.07"/>
  <circle cx="920" cy="380" r="60" fill="none" stroke="#4A9EFF" stroke-width="0.5" opacity="0.05"/>
  <line x1="80" y1="560" x2="160" y2="560" stroke="#E8C547" stroke-width="1.5" opacity="0.12"/>
  <line x1="80" y1="578" x2="120" y2="578" stroke="#4A9EFF" stroke-width="1" opacity="0.08"/>

  <!-- 左侧金线 -->
  <rect x="0" y="0" width="6" height="1350" fill="url(#goldBar)"/>

  <!-- 顶部品牌 -->
  <circle cx="80" cy="72" r="5" fill="#E8C547"/>
  <text x="100" y="80" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="20" font-weight="400" fill="#E8C547" letter-spacing="4" opacity="0.8">ALL IN PODCAST</text>

  <!-- 主标题：更鲜明的金色强调 -->
  <text x="80" y="320" font-family="PingFang SC, Noto Sans SC, sans-serif" font-weight="900" fill="#FFFFFF">
    <tspan font-size="88" x="80" dy="0">你花钱订阅的</tspan>
    <tspan font-size="88" x="80" dy="112">SaaS 可能</tspan>
    <tspan font-size="88" x="80" dy="112" fill="#E8C547">正在等死</tspan>
  </text>

  <!-- 副标题 -->
  <text x="80" y="650" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="28" font-weight="400" fill="#FFFFFF" opacity="0.35" letter-spacing="1">
    <tspan x="80" dy="0">当AI可以直接给你结果</tspan>
    <tspan x="80" dy="44">工具还值钱吗？</tspan>
  </text>

  <!-- 蓝色分隔线 -->
  <rect x="80" y="770" width="50" height="3" fill="#4A9EFF" opacity="0.6" rx="1.5"/>

  <!-- 归属 -->
  <text x="80" y="810" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.4)">All In Podcast · E270</text>

  <!-- 右下装饰 -->
  <line x1="920" y1="1080" x2="990" y2="1080" stroke="rgba(74,158,255,0.15)" stroke-width="1"/>
  <line x1="940" y1="1095" x2="990" y2="1095" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>
  <line x1="960" y1="1110" x2="990" y2="1110" stroke="rgba(74,158,255,0.09)" stroke-width="1"/>

  <!-- 散布装饰点 -->
  <circle cx="960" cy="200" r="2" fill="#E8C547" opacity="0.1"/>
  <circle cx="980" cy="220" r="1.5" fill="#4A9EFF" opacity="0.08"/>
  <circle cx="200" cy="1100" r="2" fill="#E8C547" opacity="0.06"/>

  <!-- 底部角标 -->
  <text x="80" y="1280" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.2)" letter-spacing="6">ALL IN · VOL.270</text>

  <!-- 右下圆圈 -->
  <circle cx="980" cy="1270" r="24" fill="none" stroke="rgba(232,197,71,0.15)" stroke-width="1.5"/>
  <circle cx="980" cy="1270" r="8" fill="rgba(232,197,71,0.06)"/>
</svg>
