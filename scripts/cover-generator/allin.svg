<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="subtleWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F3EC"/>
      <stop offset="100%" stop-color="#F0EBE1"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- 背景：米白暖色 -->
  <rect width="1080" height="1350" fill="url(#subtleWarm)"/>
  <rect width="1080" height="1350" filter="url(#grain)" opacity="0.02"/>

  <!-- 大号虚化期号水印 -->
  <text id="episode-watermark" x="820" y="520" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="480" font-weight="900" fill="#000000" opacity="0.03" text-anchor="middle" letter-spacing="10">270</text>

  <!-- 左侧红线 -->
  <rect x="0" y="0" width="5" height="1350" fill="#C0392B"/>

  <!-- 顶部品牌 -->
  <text id="series-label" x="80" y="80" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="20" font-weight="500" fill="#999999" letter-spacing="5">ALL IN PODCAST · 中文知识库</text>

  <!-- 主标题 -->
  <text id="main-title" x="80" y="340" font-family="PingFang SC, Noto Sans SC, sans-serif" font-weight="900" fill="#1A1A1A">
    <tspan font-size="120" x="80" dy="0">收购Cursor的</tspan>
    <tspan font-size="120" x="80" dy="150">不是买工具</tspan>
    <tspan font-size="120" x="80" dy="150" fill="#C0392B">是买算力入口</tspan>
  </text>

  <!-- 标题与副标题之间的红色分隔线 -->
  <rect x="80" y="810" width="60" height="4" fill="#C0392B" rx="2"/>

  <!-- 副标题 -->
  <text id="subtitle" x="80" y="880" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="42" font-weight="400" fill="#1A1A1A" opacity="0.55" letter-spacing="1">
    <tspan x="80" dy="0">SpaceX用编程工具做特洛伊木马</tspan>
    <tspan x="80" dy="64">SaaS债务炸弹正在倒计时</tspan>
  </text>

  <!-- 底部分隔线 -->
  <line x1="80" y1="1270" x2="1000" y2="1270" stroke="#C0392B" stroke-width="0.5" opacity="0.15"/>

  <!-- 底部三列信息 -->
  <text id="footer-left" x="80" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="700" fill="#999999" letter-spacing="4">ALL IN · VOL.270</text>
  <text id="footer-middle" x="540" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="400" fill="#C0392B" opacity="0.35" letter-spacing="3" text-anchor="middle">硅谷一线视角 · 中文深度解读</text>
  <text id="footer-right" x="1000" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="400" fill="#999999" letter-spacing="2" text-anchor="end">All In Podcast · E270</text>
</svg>
