<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <radialGradient id="warmGlow" cx="0.15" cy="0.1" r="0.8">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="0.85" cy="0.9" r="0.7">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="0.25" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#E8C547" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#E8C547" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomWeight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#D4A825"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- 背景层 -->
  <rect width="1080" height="1350" fill="url(#warmGlow)"/>
  <rect width="1080" height="1350" fill="url(#coolGlow)"/>
  <rect width="1080" height="1350" fill="url(#accentGlow)"/>
  <rect width="1080" height="1350" fill="url(#bottomWeight)"/>
  <rect width="1080" height="1350" filter="url(#grain)" opacity="0.03"/>

  <!-- 大号虚化期号水印 -->
  <text id="episode-watermark" x="700" y="1020" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="420" font-weight="900" fill="#FFFFFF" opacity="0.025" text-anchor="middle" letter-spacing="20">270</text>

  <!-- 左侧金线 -->
  <rect x="0" y="0" width="6" height="1350" fill="url(#goldBar)"/>

  <!-- 右侧几何装饰（远离标题区域） -->
  <circle cx="940" cy="280" r="110" fill="none" stroke="#E8C547" stroke-width="0.8" opacity="0.06"/>
  <circle cx="940" cy="280" r="65" fill="none" stroke="#4A9EFF" stroke-width="0.5" opacity="0.04"/>
  <circle cx="960" cy="750" r="45" fill="none" stroke="#E8C547" stroke-width="0.5" opacity="0.04"/>
  <circle cx="960" cy="750" r="22" fill="none" stroke="#4A9EFF" stroke-width="0.4" opacity="0.03"/>

  <!-- 散布装饰点 -->
  <circle cx="960" cy="180" r="2" fill="#E8C547" opacity="0.1"/>
  <circle cx="990" cy="200" r="1.5" fill="#4A9EFF" opacity="0.08"/>
  <circle cx="300" cy="1140" r="2" fill="#E8C547" opacity="0.06"/>
  <circle cx="500" cy="1180" r="1.5" fill="#4A9EFF" opacity="0.04"/>

  <!-- 顶部品牌 -->
  <circle cx="80" cy="72" r="6" fill="#E8C547"/>
  <text id="series-label" x="100" y="80" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="22" font-weight="500" fill="#E8C547" letter-spacing="5" opacity="0.85">ALL IN PODCAST</text>

  <!-- 主标题 -->
  <text id="main-title" x="80" y="320" font-family="PingFang SC, Noto Sans SC, sans-serif" font-weight="900" fill="#FFFFFF">
    <tspan font-size="128" x="80" dy="0">你花钱订阅的</tspan>
    <tspan font-size="128" x="80" dy="160">SaaS 可能</tspan>
    <tspan font-size="128" x="80" dy="160" fill="#E8C547">正在等死</tspan>
  </text>

  <!-- 标题与副标题之间的金色分隔线 -->
  <rect x="80" y="780" width="70" height="4" fill="#E8C547" rx="2"/>

  <!-- 副标题 -->
  <text id="subtitle" x="80" y="850" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="48" font-weight="400" fill="#FFFFFF" opacity="0.6" letter-spacing="2">
    <tspan x="80" dy="0">当AI可以直接给你结果</tspan>
    <tspan x="80" dy="72">工具还值钱吗？</tspan>
  </text>

  <!-- 标题下方装饰细线 -->
  <line x1="80" y1="980" x2="180" y2="980" stroke="#E8C547" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="996" x2="130" y2="996" stroke="#4A9EFF" stroke-width="0.8" opacity="0.07"/>

  <!-- 底部分隔线 -->
  <line x1="80" y1="1270" x2="1000" y2="1270" stroke="#E8C547" stroke-width="0.5" opacity="0.08"/>

  <!-- 底部三列信息（同一基线） -->
  <text id="footer-left" x="80" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.2)" letter-spacing="4">ALL IN · VOL.270</text>
  <text id="footer-middle" x="540" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="400" fill="#E8C547" opacity="0.2" letter-spacing="3" text-anchor="middle">硅谷一线视角 · 中文深度解读</text>
  <text id="footer-right" x="1000" y="1310" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.25)" letter-spacing="2" text-anchor="end">All In Podcast · E270</text>

  <!-- 右下装饰 -->
  <circle cx="980" cy="1310" r="24" fill="none" stroke="rgba(232,197,71,0.12)" stroke-width="1.5"/>
  <circle cx="980" cy="1310" r="8" fill="rgba(232,197,71,0.05)"/>
</svg>
